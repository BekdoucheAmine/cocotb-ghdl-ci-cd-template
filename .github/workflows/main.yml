name: main

# Define permissions for current workflow
permissions:
  contents: read
  checks: write

# Code runs only on pull request to main
on:
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest  # Standard runner, no custom container needed
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GHDL (Nightly)
        uses: ghdl/setup-ghdl@v1
        with:
          version: nightly
          backend: mcode  # mcode is fastest for CI; use 'llvm' if you need advanced features

      - name: Install Python dependencies
        run: |
          pip3 install cocotb

      - name: Run Simulation
        run: |
          cd tests
          python3 test_runner.py
        
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: always() # Run this even if the tests fail!
        with:
          report_paths: '**/results.xml'